services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY}
      - PORT=5000
    networks:
      - app-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge